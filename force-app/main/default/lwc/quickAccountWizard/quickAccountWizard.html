<template>
    <lightning-card title="New Enterprise Account" icon-name="standard:account">
        <div class="slds-p-around_medium">
            
            <!-- Progress Indicator -->
            <div class="slds-m-bottom_large">
                <div class="slds-progress">
                    <div class="slds-progress__bar">
                        <div class="slds-progress__value" style={progressStyle}></div>
                    </div>
                    <ul class="slds-progress__list">
                        <li class="slds-progress__item">
                            <span class="slds-progress__marker slds-is-completed"></span>
                            <span class="slds-progress__label">Complete</span>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Account Information -->
            <div class="slds-border_bottom slds-m-bottom_medium">
                <h2 class="slds-text-heading_medium">Account Information</h2>
                <p class="slds-text-color_weak slds-m-bottom_small">Enter the essential details below.</p>
            </div>

            <lightning-layout multiple-rows="true">
                <lightning-layout-item size="6" padding="horizontal-small">
                    <lightning-input label="Account Name" data-id="accName" required onchange={handleInputChange} class="slds-m-bottom_small"></lightning-input>
                    <lightning-input label="Phone" type="tel" data-id="accPhone" onchange={handleInputChange} class="slds-m-bottom_small"></lightning-input>
                </lightning-layout-item>
                
                <lightning-layout-item size="6" padding="horizontal-small">
                    <lightning-input label="Website" type="url" data-id="accWebsite" onchange={handleInputChange} class="slds-m-bottom_small"></lightning-input>
                    <lightning-input label="Industry" data-id="accIndustry" placeholder="Enter Industry..." onchange={handleInputChange} class="slds-m-bottom_small"></lightning-input>
                </lightning-layout-item>
            </lightning-layout>

            <!-- Navigation Buttons -->
            <div class="slds-align_absolute-center slds-m-top_large">
                <lightning-button 
                    variant="brand" 
                    label="Save Account" 
                    title="Save Account" 
                    onclick={handleCreate}
                    class="create-btn">
                </lightning-button>
            </div>

            <template if:true={successMessage}>
                <div class="slds-notify slds-notify_alert slds-alert_success slds-m-top_medium" role="alert">
                    <span class="slds-assistive-text">success</span>
                    <h2>{successMessage}</h2>
                </div>
            </template>

            <template if:true={errorMessage}>
                <div class="slds-notify slds-notify_alert slds-alert_error slds-m-top_medium" role="alert">
                    <h2>{errorMessage}</h2>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
