<template>
    <lightning-card title="New Enterprise Account" icon-name="standard:account">
        <div class="slds-p-around_medium">
            
            <div class="slds-border_bottom slds-m-bottom_medium">
                <h2 class="slds-text-heading_medium">Account Details</h2>
                <p class="slds-text-color_weak slds-m-bottom_small">Enter the corporate details below.</p>
            </div>

            <lightning-layout multiple-rows="true">
                
                <lightning-layout-item size="6" padding="horizontal-small">
                    <lightning-input label="Account Name" data-id="accName" required onchange={handleInputChange} class="slds-m-bottom_small"></lightning-input>
                    <lightning-input label="Phone" type="tel" data-id="accPhone" onchange={handlePhoneChange} class="slds-m-bottom_small"></lightning-input>
                    
                    <!-- Industry fDropdown -->
                    <lightning-combobox
                        name="industry"
                        label="Industry"
                        placeholder="Select Industry..."
                        options={industryOptions}
                        onchange={handleIndustryChange}
                        class="slds-m-bottom_small">
                    </lightning-combobox>
                    
                    <!-- Revenue Input with formatting -->
                    <lightning-input 
                        label="Annual Revenue" 
                        data-id="accRevenue" 
                        formatter="currency"
                        onchange={handleRevenueChange}
                        onblur={formatRevenue}
                        class="slds-m-bottom_small">
                    </lightning-input>
                    
                    <!-- Revenue Range Dropdown -->
                    <lightning-combobox
                        name="revenueRange"
                        label="Revenue Range"
                        placeholder="Select Revenue Range..."
                        options={revenueRangeOptions}
                        onchange={handleInputChange}
                        data-id="accRevenueRange"
                        class="slds-m-bottom_small">
                    </lightning-combobox>
                    
                    <!-- Account Type Dropdown -->
                    <lightning-combobox
                        name="accountType"
                        label="Account Type"
                        placeholder="Select Account Type..."
                        options={accountTypeOptions}
                        onchange={handleInputChange}
                        data-id="accType"
                        class="slds-m-bottom_small">
                    </lightning-combobox>
                    
                    <!-- Account Source -->
                    <lightning-input 
                        label="Account Source" 
                        data-id="accSource" 
                        onchange={handleInputChange}
                        class="slds-m-bottom_small">
                    </lightning-input>
                    
                    <!-- Ownership -->
                    <lightning-input 
                        label="Ownership" 
                        data-id="accOwnership" 
                        onchange={handleInputChange}
                        class="slds-m-bottom_small">
                    </lightning-input>

                </lightning-layout-item>
                <!-- Testing Context check-->

                <lightning-layout-item size="6" padding="horizontal-small">
                    <lightning-input label="Account Number" data-id="accNumber" onchange={handleInputChange} class="slds-m-bottom_small"></lightning-input>
                    <lightning-input label="Website" type="url" data-id="accWebsite" onchange={handleInputChange} class="slds-m-bottom_small"></lightning-input>
                    <lightning-input label="Employees" type="number" data-id="accEmployees" onchange={handleInputChange} class="slds-m-bottom_small"></lightning-input>
                    <lightning-input label="Billing City" data-id="accCity" onchange={handleInputChange} class="slds-m-bottom_small"></lightning-input>
                    <lightning-input label="Billing State/Province" data-id="accState" onchange={handleInputChange} class="slds-m-bottom_small"></lightning-input>
                    <lightning-input label="Billing Postal Code" data-id="accPostalCode" onchange={handleInputChange} class="slds-m-bottom_small"></lightning-input>
                    <lightning-input label="Billing Country" data-id="accCountry" onchange={handleInputChange} class="slds-m-bottom_small"></lightning-input>
                </lightning-layout-item>

            </lightning-layout>

            <div class="slds-align_absolute-center slds-m-top_large">
                <lightning-button 
                    variant="brand" 
                    label="Save Account" 
                    title="Save Account" 
                    onclick={handleCreate}
                    class="create-btn">
                </lightning-button>
            </div>

            <template if:true={successMessage}>
                <div class="slds-notify slds-notify_alert slds-alert_success slds-m-top_medium" role="alert">
                    <span class="slds-assistive-text">success</span>
                    <h2>{successMessage}</h2>
                </div>
            </template>

            <template if:true={errorMessage}>
                <div class="slds-notify slds-notify_alert slds-alert_error slds-m-top_medium" role="alert">
                    <h2>{errorMessage}</h2>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
