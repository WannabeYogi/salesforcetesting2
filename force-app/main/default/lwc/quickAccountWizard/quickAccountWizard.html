<template>
    <lightning-card title="New Account" icon-name="standard:account">
        <div class="slds-p-around_medium">
            
            <lightning-input 
                label="Account Name" 
                data-id="accName" 
                required 
                onchange={handleInputChange} 
                class="slds-m-bottom_small"
                placeholder="Enter account name">
            </lightning-input>
            
            <lightning-input 
                label="Phone" 
                type="tel" 
                data-id="accPhone" 
                required 
                onchange={handlePhoneChange} 
                class="slds-m-bottom_small"
                placeholder="(555) 123-8999">
            </lightning-input>
            
            <lightning-input 
                label="Website address" 
                type="url" 
                data-id="accWebsite" 
                required 
                onchange={handleInputChange} 
                class="slds-m-bottom_small"
                placeholder="https://www.example.com">
            </lightning-input>
            
            <lightning-input 
                label="Industry" 
                data-id="accIndustry" 
                required 
                onchange={handleInputChange} 
                class="slds-m-bottom_small"
                placeholder="Enter industry">
            </lightning-input>

            <div class="slds-align_absolute-center slds-m-top_large">
                <lightning-button 
                    variant="brand" 
                    label="Save Account" 
                    title="Save Account" 
                    onclick={handleCreate}
                    class="create-btn">
                </lightning-button>
            </div>

            <template if:true={successMessage}>
                <div class="slds-notify slds-notify_alert slds-alert_success slds-m-top_medium" role="alert">
                    <span class="slds-assistive-text">success</span>
                    <h2>{successMessage}</h2>
                </div>
            </template>

            <template if:true={errorMessage}>
                <div class="slds-notify slds-notify_alert slds-alert_error slds-m-top_medium" role="alert">
                    <h2>{errorMessage}</h2>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
